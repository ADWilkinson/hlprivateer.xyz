name: hlprivateer

x-hlp-build: &hlp-build
  context: ..
  dockerfile: infra/docker/Dockerfile

x-hlp-base-env: &hlp-base-env
  REDIS_URL: redis://redis:6379
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}

x-hlp-health-common: &hlp-health-common
  interval: 15s
  timeout: 5s
  retries: 10
  start_period: 10s

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      <<: *hlp-health-common
    volumes:
      - hlprivateer-redis:/data
    networks:
      - hlprivateer

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: privateer
      POSTGRES_USER: privateer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_postgres_password_change_me}
    volumes:
      - hlprivateer-postgres:/var/lib/postgresql/data
      - ../apps/runtime/migrations/0001_init.sql:/docker-entrypoint-initdb.d/0001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U privateer -d privateer"]
      <<: *hlp-health-common
    networks:
      - hlprivateer

  hlprivateer-api:
    build:
      <<: *hlp-build
      args:
        APP: api
    env_file:
      - ../config/.env
    environment:
      <<: *hlp-base-env
      APP: api
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL_FILE: ""
      API_HOST: 0.0.0.0
      PORT: 4000
      API_PORT: 4000
      REDIS_URL: redis://redis:6379
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:4000}
      WS_BASE_URL: ${WS_BASE_URL:-ws://localhost:4100}
      DATABASE_URL: ${DATABASE_URL:-postgres://privateer:${POSTGRES_PASSWORD:-local_postgres_password_change_me}@postgres:5432/privateer}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ../secrets:${HOST_PROJECT_PATH:-/opt/hlprivateer.xyz}/secrets:ro
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://127.0.0.1:4000/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      <<: *hlp-health-common
    restart: unless-stopped
    ports:
      - "4000:4000"
    networks:
      - hlprivateer

  hlprivateer-ws:
    build:
      <<: *hlp-build
      args:
        APP: ws-gateway
    env_file:
      - ../config/.env
    environment:
      <<: *hlp-base-env
      APP: ws-gateway
      NODE_ENV: ${NODE_ENV:-production}
      WS_PORT: 4100
      REDIS_URL: redis://redis:6379
      PORT: 4100
      WS_ALLOW_INSECURE_TOKENS: ${WS_ALLOW_INSECURE_TOKENS:-false}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../secrets:${HOST_PROJECT_PATH:-/opt/hlprivateer.xyz}/secrets:ro
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://127.0.0.1:4100/metrics').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      <<: *hlp-health-common
    restart: unless-stopped
    ports:
      - "4100:4100"
    networks:
      - hlprivateer

  hlprivateer-runtime:
    build:
      <<: *hlp-build
      args:
        APP: runtime
    env_file:
      - ../config/.env
    environment:
      <<: *hlp-base-env
      APP: runtime
      NODE_ENV: ${NODE_ENV:-production}
      DRY_RUN: ${DRY_RUN:-false}
      ENABLE_LIVE_OMS: false
      LIVE_MODE_APPROVED: false
      HL_PRIVATE_KEY_FILE: ""
      REDIS_URL: redis://redis:6379
      DATABASE_URL_FILE: ""
      DATABASE_URL: ${DATABASE_URL:-postgres://privateer:${POSTGRES_PASSWORD:-local_postgres_password_change_me}@postgres:5432/privateer}
      RUNTIME_METRICS_PORT: 9400
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ../secrets:${HOST_PROJECT_PATH:-/opt/hlprivateer.xyz}/secrets:ro
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://127.0.0.1:9400/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      <<: *hlp-health-common
    restart: unless-stopped
    ports:
      - "9400:9400"
    networks:
      - hlprivateer

  hlprivateer-agent-runner:
    build:
      <<: *hlp-build
      args:
        APP: agent-runner
    env_file:
      - ../config/.env
    environment:
      <<: *hlp-base-env
      APP: agent-runner
      NODE_ENV: ${NODE_ENV:-production}
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
      hlprivateer-runtime:
        condition: service_started
    volumes:
      - ../secrets:${HOST_PROJECT_PATH:-/opt/hlprivateer.xyz}/secrets:ro
    restart: unless-stopped
    networks:
      - hlprivateer

  hlprivateer-web:
    build:
      <<: *hlp-build
      args:
        APP: web
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
        NEXT_PUBLIC_WS_BASE_URL: ${NEXT_PUBLIC_WS_BASE_URL:-ws://localhost:4100}
    env_file:
      - ../config/.env
    environment:
      <<: *hlp-base-env
      APP: web
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
      NEXT_PUBLIC_WS_BASE_URL: ${NEXT_PUBLIC_WS_BASE_URL:-ws://localhost:4100}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:4000}
    depends_on:
      hlprivateer-api:
        condition: service_healthy
      hlprivateer-ws:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://127.0.0.1:3000/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      <<: *hlp-health-common
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - hlprivateer

volumes:
  hlprivateer-redis:
  hlprivateer-postgres:

networks:
  hlprivateer:
