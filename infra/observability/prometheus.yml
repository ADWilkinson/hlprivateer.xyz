global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alerts/hlp-rules.yml

scrape_configs:
  - job_name: hlprivateer_api
    static_configs:
      - targets: ['127.0.0.1:4000']

  - job_name: hlprivateer_runtime
    static_configs:
      - targets: ['127.0.0.1:9400']
    metrics_path: /metrics

  - job_name: hlprivateer_ws
    static_configs:
      - targets: ['127.0.0.1:4100']
    metrics_path: /metrics

  - job_name: hlprivateer_otel
    static_configs:
      - targets: ['127.0.0.1:8889']
